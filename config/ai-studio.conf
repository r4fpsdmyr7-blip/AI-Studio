# ============================================================================
# AI Studio - Global Configuration File
# ============================================================================
# This file contains global settings for the AI Studio platform.
# Format: KEY="VALUE" (Values must be enclosed in double quotes).
# Lines starting with '#' are comments and will be ignored.
# ============================================================================

# ----------------------------------------------------------------------------
# 1. Basic Behavior (Level 0: Daily Usage)
# ----------------------------------------------------------------------------
# Automatically open the system's default web browser when a component service 
# starts successfully. 
# Set to "false" if you are running AI Studio on a headless server, via SSH, 
# or prefer to manage browser tabs manually.
AUTO_OPEN_BROWSER="true"


# ----------------------------------------------------------------------------
# 2. Network & Ports (Level 1: Standard Configuration)
# ----------------------------------------------------------------------------
# Global port offset. 
# This is useful if the default ports (e.g., 3000, 8188) are already occupied 
# by other applications on your Mac. 
# Set to "0" to use default component ports. 
# Set to "1000" to shift all component ports up by 1000 (e.g., 3000 -> 4000).
DEFAULT_PORT_OFFSET="0"


# ----------------------------------------------------------------------------
# 3. Logging & Diagnostics (Level 2: Advanced Configuration)
# ----------------------------------------------------------------------------
# Core log level for AI Studio scripts.
# Options: 
#   "info"  - Standard output (recommended for daily use)
#   "debug" - Verbose output (enables detailed tracing for troubleshooting)
LOG_LEVEL="info"

# Maximum depth for automated diagnosis checks when running without explicit flags.
# 1 = Simple (checks process status, port availability, and recent log errors)
# 2 = Deep  (additionally checks system resources, swap usage, and dependencies)
MAX_DIAGNOSE_DEPTH="2"


# ----------------------------------------------------------------------------
# 4. Storage & Paths (Level 3: Expert Configuration)
# ----------------------------------------------------------------------------
# Global directory for storing downloaded AI models.
# If left empty (""), each component will use its own default directory 
# (e.g., inside its respective component folder or ~/.ollama).
# If set, supported components will symlink or redirect model storage here 
# to save disk space and centralize management.
# Example: GLOBAL_MODEL_DIR="/Users/yourusername/AI_Models"
GLOBAL_MODEL_DIR=""

# Custom Python virtual environment path (Advanced).
# If you prefer to use a specific system-wide or custom Python environment 
# instead of letting components create their own, specify the path here.
# Example: CUSTOM_PYTHON_ENV="/opt/homebrew/opt/python@3.11"
CUSTOM_PYTHON_ENV=""
