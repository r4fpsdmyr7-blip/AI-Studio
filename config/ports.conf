# ============================================================================
# AI Studio - Global Port Mapping Configuration
# ============================================================================
# This file centrally manages the default listening ports for all components.
# Format: COMPONENT_PORT="PORT_NUMBER" (Values must be enclosed in double quotes).
# Leave the value empty ("") for components that do not expose a network port 
# (e.g., IDE plugins, desktop apps, or background frameworks).
# ============================================================================

# ----------------------------------------------------------------------------
# 1. Web UI Components (User Interfaces)
# ----------------------------------------------------------------------------
# Open WebUI: Powerful local LLM web interface
OPEN_WEBUI_PORT="3000"

# SillyTavern: Advanced frontend for LLM roleplay and chatting
SILLYTAVERN_PORT="8000"

# ComfyUI: Node-based image generation UI (SDXL/FLUX)
COMFYUI_PORT="8188"


# ----------------------------------------------------------------------------
# 2. Backend / API / Agent Components
# ----------------------------------------------------------------------------
# Browser Use: AI-driven browser automation tool API
BROWSER_USE_PORT="7788"

# QWen3 Uncensored: Local LLM execution via Ollama
QWEN3_PORT="11434"


# ----------------------------------------------------------------------------
# 3. Non-Networked Components (Frameworks, Plugins, Desktop Apps)
# ----------------------------------------------------------------------------
# Continue.dev: VS Code / JetBrains AI coding assistant (No standalone port)
CONTINUE_DEV_PORT=""

# Fazm: Native macOS AI Desktop Agent (No standalone port)
FAZM_PORT=""

# MLX: Apple's machine learning framework (No standalone port)
MLX_PORT=""

# MLX-Video: Local video generation tool (CLI/Script based, no standalone port)
MLX_VIDEO_PORT=""


# ============================================================================
# 💡 Usage Instructions (Progressive Disclosure)
# ============================================================================
# If you encounter a "Port already in use" error when starting a component:
# 1. Identify the conflicting component above (e.g., OPEN_WEBUI_PORT="3000").
# 2. Change the port number to an available one (e.g., OPEN_WEBUI_PORT="3001").
# 3. Save this file.
# 4. Restart the component: ./ai-studio.sh restart open-webui
#
# Note: The main script and component scripts will automatically read these 
# values to determine which port to bind to and which URL to open in the browser.
# ============================================================================
